<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>{{ page.title }} - {{ site.title }}</title>
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title }} - {{ site.title }}">
<meta name="twitter:keywords" content="{{ page.title }} - {{ site.title }}" property='og:description' />
<meta property="og:type" content="article">
<meta property="og:title" content="{{ page.title }} - {{ site.title }}">
<meta name="og:keywords" content="{{ page.title }} - {{ site.title }}|{{ page.content | strip_html | strip_newlines | truncate: 120 }}" property='og:description' />
<meta name="theme-Jekyll by liberxue" content="#eb5055">
<meta name="keywords" content="{{ page.content | strip_html | strip_newlines | truncate: 120 }}" property='og:description' />
<meta name="description" content="nothing is more practicla than a good theory" />
<link href="{{ site.url }}/static/favicon.ico" rel="icon" type="image/png" />
<link href="{{ site.url }}/static/favicon.ico" rel="shortcut icon" type="image/png">
<link href="{{ site.url }}/static/favicon.ico" rel="shortcut icon" type="image/x-icon">
<link href="{{ site.url }}/" rel="canonical">
<link href="{{ site.url }}/feed.xml" rel="alternate" type="application/rss+xml" title="Liberxue">
<link href="/manifest.json" rel="manifest">
<link href="https://cdn.bootcss.com/highlight.js/9.10.0/styles/xcode.min.css" rel="stylesheet">
<link href="{{ site.url }}/static/css/style-default.css" rel="stylesheet">
{% if page.date %}
<meta content='{{ site.url }}{{ page.url }}' property='og:url' />
<meta content="{{ site.url }}{{ page.url }}|{{ page.content | strip_html | strip_newlines | truncate: 120 }}" property='og:description' />
<meta content="article" property="og:type" />
{% else %}
<meta content='{{ site.url }}' property='og:url' />
<meta content="{{ site.description }}" property='og:description' />
<meta content="blog" property="og:type" />
{% endif %}
{% if site.google_analytics %}
<script>
  (function(i, s, o, g, r, a, m) {
    i['GoogleAnalyticsObject'] = r;
    i[r] = i[r] || function() {
      (i[r].q = i[r].q || []).push(arguments);
    }, i[r].l = 1 * new Date();
    a = s.createElement(o),
      m = s.getElementsByTagName(o)[0];
    a.async = 1;
    a.src = g;
    m.parentNode.insertBefore(a, m);
  })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');
  ga('create', '{{ site.google_analytics }}', 'auto');
  ga('send', 'pageview');
</script>
{% endif %}
