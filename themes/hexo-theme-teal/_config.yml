# hexo-theme-teal
# https://github.com/Zoctan/hexo-theme-teal
menu:
  home:                   /
  archives:               /archives
  tags:                   /tags
  th-list:                /categories
  user:                   /about

# 头像url
avatar:                   /img/avatar.png
# avatar link
avatar_link:              /about
# 头像背景图
brand:                    /img/brand.png
# favicon
favicon:                  /img/favicon.ico

socail:
  github:                 https://github.com/Zoctan
  stack-overflow:         https://stackoverflow.com/users/8932516/zoctan

# 设置 Android L Chrome 浏览器状态栏颜色
color:                    "#009688"

# 列表文章内容截断
# 文章摘要渲染方式: 为 true 时将渲染为 html，否则为文本
excerpt_render:           false
# 截断长度
excerpt_length:           48
excerpt_link:             阅读全文...
# 支持公式渲染
mathjax:                  true

archive_yearly:           true

# 是否显示文章最后更新时间
show_last_updated:        true

# 是否开启分享
share:                    true

# 是否开启打赏，关闭 reward:       false
reward:
  title:                  赏包辣条钱吧(๑•ᴗ•๑)~
  wechat:                 /img/wechat.png     #微信，关闭设为 false
  alipay:                 /img/alipay.png     #支付宝，关闭设为 false

# 是否开启搜索
search:                   true
# 搜索的内容
jsonContent:
  meta: false
  pages: false
  posts:
    title: true
    date: true
    path: true
    text: true
    raw: false
    content: false
    slug: false
    updated: false
    comments: false
    link: false
    permalink: false
    excerpt: false
    categories: false
    tags: true

# 是否大屏幕下文章页隐藏导航
hideMenu:                 true

# 是否开启toc
# toc:                    false
toc:
  list_number:            true  # 是否显示数字排序

# 文章页留言内容，hexo中所有变量及辅助函数等均可调用，具体请查阅 hexo.io
postMessage:              The tears will dry, the smiles will fade, while the memories last forever.

# 站长统计，如要开启，输入CNZZ站点id，如 cnzz: 1271740271
cnzz:                     false

# 百度统计，如要开启，改为你的 key
baidu_tongji:             6d56a752598eadf952ff790975b8c157

# 百度推送
baidu_push:               true

# 腾讯分析，如要开启，输入站点id
tajs:                     64869149

# google
# google_analytics:       UA-109619265-1
google_analytics:         false
google_site_verification: false

# less
less:
  compress:               true
  paths:
    - source/css/style.less

# 是否使用 gitment，https://github.com/imsun/gitment
gitment:                  false
# gitment:
#   owner:
#   repo:
#   client_id:
#   client_secret:

# 规范网址
# 让搜索引擎重定向你的不同域名、不同子域、同域不同目录的站点到你期望的路径
# https://support.google.com/webmasters/answer/139066
# 假设配置为 canonical:        http://imys.net，那么从搜索引擎中 www.imys.net 进入会重定向到 imys.net
canonical:                false

# 版权起始年份
since_year:               2017

# “不蒜子”访问量统计 http://busuanzi.ibruce.info/
visit_counter:            true

# 设置为 true 发布后将使用 unpkg cdn 最新的主题样式
# 如果想让你的自定义样式生效，把此项设为 false
cdn:                      false

# 文章图片灯箱效果
lightbox:                 true

# ICP备案号  ICP_license:    京ICP备1234556号-1
ICP_license:              false
